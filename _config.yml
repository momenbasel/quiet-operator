title: Quiet Operator
description: "A purple-team field manual for staying stealthy on the host and on the wire. Linux-first. Every offensive page paired with the exact detection telemetry that catches it."
url: "https://momenbasel.github.io"
baseurl: "/quiet-operator"

theme: just-the-docs

color_scheme: dark

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

heading_anchors: true

mermaid:
  version: "10.9.0"

plugins:
  - jekyll-include-cache

aux_links:
  "GitHub":
    - "https://github.com/momenbasel/quiet-operator"
  "HTB Writeups":
    - "https://momenbasel.github.io/htb-writeups/"

aux_links_new_tab: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

footer_content: 'Copyright &copy; 2026 <a href="https://github.com/momenbasel">Moamen Basel</a>. Distributed under the <a href="https://github.com/momenbasel/quiet-operator/blob/main/LICENSE">MIT License</a>. Authorized engagements only &mdash; read <a href="/quiet-operator/DISCLAIMER">DISCLAIMER</a>.'

head_extra: |
  <link rel="stylesheet" href="/quiet-operator/assets/css/custom.css">

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  caution:
    title: Caution
    color: yellow

exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules/"
  - ".gitignore"

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs/00-foundations"
    values:
      parent: "0. Foundations"
  - scope:
      path: "docs/linux"
    values:
      parent: "1. Linux"
  - scope:
      path: "docs/data-transfer"
    values:
      parent: "2. Data Transfer"
  - scope:
      path: "docs/windows"
    values:
      parent: "3. Windows"
  - scope:
      path: "docs/c2-infrastructure"
    values:
      parent: "4. C2 Infrastructure"
  - scope:
      path: "docs/detection-mapping"
    values:
      parent: "5. Detection Mapping"
  - scope:
      path: "docs/references"
    values:
      parent: "References"
